<header class="site-header">
  <div class="site-header-inner shell">
    <a class="brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
    <nav class="site-nav" aria-label="Primary">
      {% for item in site.data.navigation %}
      {% assign section_id = item.url | split: "#" | last %}
      <a
        class="nav-link"
        href="{{ item.url | relative_url }}"
        {% if item.url contains "#" %}data-section="{{ section_id }}"{% endif %}
      >{{ item.label }}</a>
      {% endfor %}
    </nav>
  </div>
</header>
