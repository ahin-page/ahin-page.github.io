<!doctype html>
<html lang="{{ site.lang | default: "en" }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ page.description | default: site.description }}">
    <title>{% if page.title and page.title != "Home" %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    <link rel="stylesheet" href="{{ '/assets/main.css' | relative_url }}">
    <script src="{{ '/assets/nav.js' | relative_url }}" defer></script>
    {% seo %}
  </head>
  <body>
    {% include site-header.html %}
    <main class="site-main">
      {{ content }}
    </main>
    {% include site-footer.html %}
    {% if page.page_scripts %}
      {% for script_path in page.page_scripts %}
    <script src="{{ script_path | relative_url }}" defer></script>
      {% endfor %}
    {% endif %}
  </body>
</html>
